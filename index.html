<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exicore — Construction Robotics Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .hero { text-align: center; padding: 60px 24px; max-width: 700px; }
    .badge { display: inline-block; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 6px 16px; font-size: 13px; color: #999; margin-bottom: 32px; letter-spacing: 0.05em; text-transform: uppercase; }
    h1 { font-size: clamp(40px, 7vw, 72px); font-weight: 700; line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 24px; }
    h1 span { color: #0071E3; }
    p { font-size: 20px; color: #999; line-height: 1.6; margin-bottom: 40px; max-width: 500px; margin-left: auto; margin-right: auto; }
    .cta { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { background: #0071E3; color: #fff; padding: 14px 28px; border-radius: 980px; font-size: 16px; font-weight: 500; text-decoration: none; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; padding: 14px 28px; border-radius: 980px; font-size: 16px; font-weight: 500; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); }
    .tagline { margin-top: 80px; font-size: 13px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="badge">Coming Soon</div>
    <h1>The <span>operating system</span> for construction robots.</h1>
    <p>Discover, evaluate, simulate, and deploy any construction robot — from a single platform. Vendor-agnostic. Built for general contractors.</p>
    <div class="cta">
      <a href="mailto:anton@exicore.ai" class="btn-primary">Get Early Access</a>
      <a href="https://twitter.com/exicore_ai" class="btn-secondary">Follow @exicore_ai</a>
    </div>
    <p class="tagline">Exicore · Construction Robotics · 2026</p>
  </div>
</body>
</html>
